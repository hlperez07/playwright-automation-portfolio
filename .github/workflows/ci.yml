name: Playwright Tests

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'
          ORANGEHRM_URL: ${{ secrets.ORANGEHRM_URL }}
          ORANGEHRM_ADMIN_USER: ${{ secrets.ORANGEHRM_ADMIN_USER }}
          ORANGEHRM_ADMIN_PASS: ${{ secrets.ORANGEHRM_ADMIN_PASS }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Get previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history for trend
        if: always()
        run: |
          if [ -d gh-pages/report/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/report/history/. allure-results/history/
          fi

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --quiet

      - name: Generate Allure report
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-history
          else
            mkdir -p allure-history
            echo '<html><body style="font-family:sans-serif;padding:2rem"><h1>No test results</h1><p>Run the pipeline with tests to generate a report.</p></body></html>' > allure-history/index.html
          fi

      - name: Build GitHub Pages site
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p site/report
          if [ -d allure-history ] && [ "$(ls -A allure-history 2>/dev/null)" ]; then
            cp -r allure-history/. site/report/
          fi
          cp -r docs/. site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
          force_orphan: true
